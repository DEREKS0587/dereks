
<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Checkout | DEREK'S</title><link rel="stylesheet" href="styles.css"></head>
<body><div class="topbar">Checkout · Mayoreo desde 6 piezas · WhatsApp 899 318 4867</div>
<header><div class="container nav"><a class="brand" href="index.html"><img src="assets/logo.png" alt=""><div class="brand-name">DEREK'S</div></a></div></header>
<main class="container" style="padding:34px 0 44px;"><div class="section-head"><div><h2>Checkout</h2><p>Revisa tu pedido y termina por WhatsApp.</p></div></div><div class="brand-block" style="max-width:900px;"><div class="meta" style="margin-bottom:12px;">Mayoreo automático desde 6 piezas.</div><div id="summary"></div><div class="row" style="margin-top:18px;padding-top:18px;border-top:1px solid var(--line);"><strong>Total</strong><strong id="total">$0 MXN</strong></div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;"><a class="btn btn-secondary" href="index.html">Seguir comprando</a><button class="btn btn-primary" id="sendOrderBtn">Enviar pedido por WhatsApp</button></div></div></main>
<script>
function money(v){ return '$' + Number(v).toLocaleString('es-MX') + ' MXN'; }
function getCart(){ return JSON.parse(localStorage.getItem('dereks_cart') || '[]'); }
const cart = getCart(); const summary = document.getElementById('summary'); const totalEl = document.getElementById('total');
function renderSummary(){ const totalItems = cart.reduce((s,i)=>s+i.qty,0); const isWholesale = totalItems >= 6; if(!cart.length){ summary.innerHTML = '<div class="meta">Tu carrito está vacío.</div>'; totalEl.textContent = '$0 MXN'; return; } summary.innerHTML = cart.map(item => { const unit = isWholesale && item.wholesale_price ? item.wholesale_price : item.price; return '<div class="cart-item"><div class="cart-thumb"><img src="'+item.image+'" alt="'+item.name+'"></div><div><strong>'+item.name+'</strong><div class="meta">'+item.brand+(item.size ? ' · Talla '+item.size : '')+' · '+(isWholesale ? 'Mayoreo' : 'Menudeo')+'</div><div class="meta">'+money(unit)+' c/u</div></div><strong>'+money(item.qty*unit)+'</strong></div>'; }).join(''); totalEl.textContent = money(cart.reduce((s,i)=>s+i.qty*((isWholesale && i.wholesale_price)?i.wholesale_price:i.price),0)); }
renderSummary();
document.getElementById('sendOrderBtn').addEventListener('click', () => { if(!cart.length){ alert('Tu carrito está vacío.'); return; } const totalItems = cart.reduce((s,i)=>s+i.qty,0); const isWholesale = totalItems >= 6; const lines=['Hola, vi tu página y quiero hacer este pedido de DEREK\'S:','']; cart.forEach(i => { const unit = isWholesale && i.wholesale_price ? i.wholesale_price : i.price; lines.push('• '+i.name+(i.size ? ' - Talla '+i.size : '')+' x'+i.qty+' - '+money(i.qty*unit)); }); lines.push('', 'Tipo de precio: '+(isWholesale ? 'Mayoreo' : 'Menudeo')); lines.push('Total: '+totalEl.textContent); window.open('https://wa.me/528993184867?text='+encodeURIComponent(lines.join('\n')), '_blank'); });
</script></body></html>
